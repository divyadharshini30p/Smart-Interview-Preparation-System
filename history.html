<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History</title>
    <style>
        :root {
            --navy: #0a1929;
            --navy-light: #1e3a6f;
            --white: #ffffff;
            --off-white: #f8fafc;
            --gray: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: var(--off-white);
            color: var(--navy);
            min-height: 100vh;
        }
        .sidebar {
            position: fixed;
            left: -260px;
            top: 0;
            width: 260px;
            height: 100vh;
            background: var(--navy);
            color: white;
            transition: left 0.3s ease;
            padding: 2rem 0;
            z-index: 1000;
        }
        .sidebar.open { left: 0; }
        .sidebar a {
            display: block;
            padding: 1rem 2rem;
            color: white;
            text-decoration: none;
        }
        .sidebar a:hover { background: var(--navy-light); }
        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            display: block;
        }
        .main {
            margin-left: 0;
            padding: 2rem;
        }
        header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .menu-toggle {
            background: var(--navy);
            color: white;
            border: none;
            font-size: 1.8rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
        }
        h1 { font-size: 2rem; color: var(--navy); }
        .history-table {
            background: white;
            border: 1px solid var(--gray);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--navy); color: white; padding: 1rem; text-align: left; }
        td { padding: 1rem; border-bottom: 1px solid var(--gray); }
        .btn {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            background: var(--danger);
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        .btn:hover { background: #dc2626; }
        .btn-all {
            background: var(--navy);
            margin-bottom: 1rem;
        }
        .center { text-align: center; margin-bottom: 1rem; }
        @media (max-width: 768px) {
            table { font-size: 0.9rem; }
            td, th { padding: 0.5rem; }
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <button class="close-btn" id="closeSidebar">&times;</button>
        <a href="{{ url_for('index') }}">🏠 Home</a>
        <a href="{{ url_for('practice') }}">📚 Practice</a>
        <a href="{{ url_for('history') }}">📜 History</a>
        <a href="{{ url_for('dashboard') }}">📊 Dashboard</a>
        <a href="{{ url_for('quiz_start') }}">📝 Final Quiz</a>
    </div>
    <div class="main">
        <header>
            <button class="menu-toggle" id="menuToggle">☰</button>
            <h1>Quiz History</h1>
        </header>
        <div class="center">
            <a href="{{ url_for('delete_all') }}" class="btn btn-all" onclick="return confirm('Delete all history?')">Delete All</a>
        </div>
        <div class="history-table">
            <table>
                <thead><tr><th>Date</th><th>Score</th><th>Percentage</th><th>Action</th></tr></thead>
                <tbody>
                    {% for s in scores %}
                    <tr>
                        <td>{{ s.date.strftime('%Y-%m-%d %H:%M') }}</td>
                        <td>{{ s.score }}/{{ s.total }}</td>
                        <td>{{ "%.1f"|format(s.percentage) }}%</td>
                        <td><a href="{{ url_for('delete', id=s.id) }}" class="btn" onclick="return confirm('Delete this record?')">Delete</a></td>
                    </tr>
                    {% else %}
                    <tr><td colspan="4" style="text-align:center;">No quiz attempts yet.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            const closeBtn = document.getElementById('closeSidebar');
            menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));
            closeBtn.addEventListener('click', () => sidebar.classList.remove('open'));
            document.addEventListener('click', (e) => {
                if (!sidebar.contains(e.target) && !menuToggle.contains(e.target))
                    sidebar.classList.remove('open');
            });
        });
    </script>
</body>
</html>
